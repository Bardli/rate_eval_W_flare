# AMOS Splenomegaly Dataset Configuration

# Data paths
data:
  root_dir: /home/baidu/scratch/Pillar_Eval/rate-evals/split_jsons
  
  # JSON file paths for different splits
  train_json: /home/baidu/scratch/Pillar_Eval/rate-evals/split_jsons/output/splenomegaly/train.json
  valid_json: /home/baidu/scratch/Pillar_Eval/rate-evals/split_jsons/output/splenomegaly/valid.json
  test_json: /home/baidu/scratch/Pillar_Eval/rate-evals/split_jsons/output/splenomegaly/test.json
  
  # Cache manifest for preprocessed volumes
  cache_manifest: /home/baidu/scratch/Pillar_Eval/rate-evals/split_jsons/output/splenomegaly/manifest.csv


# Dataset processing parameters
target_d: 384
target_h: 384
target_w: 384
pad_value: -1.0
transform_option: pad,nearest
use_opencv: true
image_mode: L
transforms_3d: DHW

# Dataset metadata
img_paths_key: nii_path
csv_caption_key: report_metadata
separator: "," 

# Modality for the model
modality: "abdomen_ct"  # Specify the modality for the multimodal model

# Disease-specific metadata
disease_name: "splenomegaly"  # splenomegaly
dataset_name: "amos_splenomegaly"
sample_count: 1177
