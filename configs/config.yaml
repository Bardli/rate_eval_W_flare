# Main Configuration for RATE Evaluation Pipeline
# This is the central configuration file that imports and merges all other configs

defaults:
  - model: medgemma  # Default model - can be overridden via CLI
  - dataset: dummy   # Default dataset - can be overridden via CLI
  - _self_           # This config takes precedence over defaults

# Dataset registry with config file mappings
datasets:
  dummy:
    class: DummyDataset
    config: configs/dataset/dummy.yaml
  abd_ct_merlin:
    class: MerlinAbdCT
    config: configs/dataset/abd_ct_merlin.yaml
  abd_ct_merlin_for_merlin_model:
    class: MerlinAbdCTForMerlinModel
    config: configs/dataset/abd_ct_merlin_for_merlin_model.yaml
  abd_ct_merlin_for_ctclip_model:
    class: MerlinAbdCTForCTCLIPModel
    config: configs/dataset/abd_ct_merlin_for_ctclip_model.yaml
# Dataset adds here  
  amos_ascites:
    class: MerlinAbdCT
    config: configs/dataset/amos_ascites.yaml
  amos_atherosclerosis:
    class: MerlinAbdCT
    config: configs/dataset/amos_atherosclerosis.yaml
  amos_colorectal_cancer:
    class: MerlinAbdCT
    config: configs/dataset/amos_colorectal_cancer.yaml
  amos_lymphadenopathy:
    class: MerlinAbdCT
    config: configs/dataset/amos_lymphadenopathy.yaml
  amos_adrenal_hyperplasia:
    class: MerlinAbdCT
    config: configs/dataset/amos_adrenal_hyperplasia.yaml
  amos_cholecystitis:
    class: MerlinAbdCT
    config: configs/dataset/amos_cholecystitis.yaml
  amos_fatty_liver:
    class: MerlinAbdCT
    config: configs/dataset/amos_fatty_liver.yaml
  amos_gallstone:
    class: MerlinAbdCT
    config: configs/dataset/amos_gallstone.yaml
  amos_hydronephrosis:
    class: MerlinAbdCT
    config: configs/dataset/amos_hydronephrosis.yaml
  amos_kidney_stone:
    class: MerlinAbdCT
    config: configs/dataset/amos_kidney_stone.yaml
  amos_liver_calcifications:
    class: MerlinAbdCT
    config: configs/dataset/amos_liver_calcifications.yaml
  amos_liver_cyst:
    class: MerlinAbdCT
    config: configs/dataset/amos_liver_cyst.yaml
  amos_liver_lesion:
    class: MerlinAbdCT
    config: configs/dataset/amos_liver_lesion.yaml
  amos_renal_cyst:
